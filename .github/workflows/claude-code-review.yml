name: Claude Code Review

on:
  workflow_call:
    inputs:
      model:
        description: Claude model to use
        required: false
        type: string
        default: "claude-opus-4-8"
      runner-labels:
        description: JSON array of runner labels
        required: false
        type: string
        default: '["self-hosted"]'
      max-turns:
        description: Max Claude turns (controls cost)
        required: false
        type: number
        default: 60
      review-prompt:
        description: Custom review prompt appended to default (empty = default only)
        required: false
        type: string
        default: ""
      track-progress:
        description: Show progress tracking comment
        required: false
        type: boolean
        default: false
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    name: Claude Review
    runs-on: ${{ fromJson(inputs.runner-labels) }}
    # Supersede in-progress reviews when newer commits land. Scoped per-event so
    # @claude comment/assign runs are never cancelled by a push (synchronize) run.
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}-${{ github.event_name }}
      cancel-in-progress: true
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'claude[bot]') ||
      (github.event_name == 'pull_request')
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: ${{ inputs.track-progress }}
          include_fix_links: true
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Read,Glob,Grep,Bash(git log:*),Bash(git diff:*),Bash(git show:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            You are a senior code reviewer. Review this PR thoroughly.

            ## How to review

            1. Run `gh pr diff $PR_NUMBER` to see all changes
            2. Run `gh pr view $PR_NUMBER` for PR description and context
            3. Read relevant surrounding code with `Read` / `Grep` / `Glob` to understand context — don't review in isolation
            4. If there are CI failures visible, inspect them with `gh api`

            ## Use your previous reviews (avoid repeating yourself)

            This PR may have been reviewed by you before on an earlier commit. Before
            writing anything, load what you already said so you don't repeat it:

            - Prior formal reviews + verdicts:
              `gh api repos/$REPO/pulls/$PR_NUMBER/reviews --jq '[.[] | select(.user.login == "claude[bot]")] | .[] | {state, commit_id, body}'`
            - Your prior inline comments (path, line, body):
              `gh api repos/$REPO/pulls/$PR_NUMBER/comments --paginate --jq '[.[] | select(.user.login == "claude[bot]")] | .[] | {path, line, body, commit_id}'`

            Then, when reviewing:
            - **Do NOT re-post an issue you already flagged on a line that is unchanged
              since your last review.** Use the diff to tell what actually changed.
            - If a prior finding's code WAS changed, re-evaluate it: confirm it's fixed
              (mention it as resolved in your summary) or, if still wrong, comment again.
            - You may use `git log` / `git diff <prior_commit_id> ${{ github.event.pull_request.head.sha }}`
              to see exactly what moved since your last review, but still review the WHOLE
              PR for correctness — incremental commits can break previously-clean code.
            - New, genuine issues introduced by the latest commits are top priority.

            ## What to look for (in priority order)

            **Critical (always flag):**
            - Security vulnerabilities: injection, auth bypass, secrets exposure, SSRF, path traversal
            - Data loss risks: missing transactions, race conditions, unsafe deletions
            - Bugs: null derefs, off-by-one, wrong conditions, unhandled error paths
            - Breaking changes that aren't called out in the PR description

            **Important (flag when clear):**
            - Logic errors or incorrect assumptions
            - Missing error handling at system boundaries (external APIs, user input, file I/O)
            - Resource leaks (unclosed connections, missing cleanup)
            - Concurrency issues (deadlocks, missing synchronization)

            **Suggestions (only when high-value):**
            - Significantly simpler approaches that reduce complexity
            - Performance issues with measurable impact (N+1 queries, unbounded allocations)

            ## What NOT to flag

            - Style preferences, naming opinions, formatting
            - Missing docs/comments on clear code
            - "Consider using X instead of Y" without concrete benefit
            - Hypothetical future issues ("what if someone later...")
            - Anything that's consistent with existing codebase patterns

            ## How to give feedback

            **Inline comments** — use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true` for each specific issue:
            - Point to the exact line(s) with the problem
            - Explain WHY it's a problem, not just what's wrong
            - For bugs/security: include a concrete scenario that triggers the issue
            - Use ```suggestion blocks when you have a clear fix

            **Summary & verdict** — after reviewing all files, submit exactly one formal review via `gh api` with your summary as the body:
            - If NO critical or important issues found:
              `gh api repos/$REPO/pulls/$PR_NUMBER/reviews -f event=APPROVE -f body="<your summary>"`
            - If critical or important issues found:
              `gh api repos/$REPO/pulls/$PR_NUMBER/reviews -f event=REQUEST_CHANGES -f body="<your summary>"`
            - Start the summary with a one-line verdict, then list any findings with file:line references
            - If everything looks good, keep it short — don't pad with generic praise
            - Do NOT post a separate `gh pr comment` — the review body IS your summary

            **The verdict must reflect ALL outstanding issues, not just the latest commits.**
            A later run sees only your most recent review. So if any critical/important
            issue you raised in an earlier review is still unaddressed in the current code,
            you MUST submit `REQUEST_CHANGES` again — even if the newest commits are clean.
            Re-list those still-open findings in the summary. Only `APPROVE` when nothing
            critical/important remains across the entire PR.

            ## Rules

            - Be precise. Vague concerns waste reviewer time.
            - Be confident. Only flag things you're sure about. If uncertain, say so explicitly.
            - Respect existing patterns. If the codebase does X consistently, don't flag X.
            - Fewer high-quality comments > many low-value comments. Aim for signal, not noise.
            - Review ALL files and flag ALL critical/important issues in a single pass. Don't stop after finding the first problem.
            - Read enough context. Don't comment on a function without reading its callers.

            ${{ inputs.review-prompt }}

      - name: Review gate
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          sleep 5

          REVIEW_STATE=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.user.login == "claude[bot]")] | last | .state // empty')

          echo "Claude review state: $REVIEW_STATE"

          if [ "$REVIEW_STATE" = "CHANGES_REQUESTED" ]; then
            echo "::error::Claude requested changes — see review comments"
            exit 1
          elif [ "$REVIEW_STATE" = "APPROVED" ]; then
            echo "Claude approved the PR"
          else
            echo "::warning::No formal review submitted by Claude"
          fi

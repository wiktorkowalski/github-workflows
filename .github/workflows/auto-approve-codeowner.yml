name: Auto Approve Codeowner PR

on:
  workflow_call:
    inputs:
      runner-labels:
        description: JSON array of runner labels
        required: false
        type: string
        default: '["ubuntu-latest"]'
      max-retries:
        description: Max retries waiting for checks to complete
        required: false
        type: number
        default: 10
      retry-interval-seconds:
        description: Seconds between retry attempts
        required: false
        type: number
        default: 30

jobs:
  auto-approve:
    name: Auto Approve PR
    runs-on: ${{ fromJson(inputs.runner-labels) }}
    if: github.event_name == 'workflow_dispatch' || github.event.check_suite.pull_requests[0]
    permissions:
      pull-requests: write
      checks: read
      statuses: read
      contents: read

    steps:
      - name: Get PR number
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;
            let prAuthor;
            let headSha;

            if (context.eventName === 'workflow_dispatch') {
              prNumber = context.payload.inputs.pr_number;
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(prNumber)
              });
              prAuthor = pr.data.user.login;
              headSha = pr.data.head.sha;
            } else if (context.eventName === 'check_suite') {
              const prs = context.payload.check_suite.pull_requests;
              if (!prs || prs.length === 0) {
                console.log('No PRs associated with this check suite');
                return;
              }
              prNumber = prs[0].number;
              headSha = context.payload.check_suite.head_sha;
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              prAuthor = pr.data.user.login;
            }

            console.log(`PR: #${prNumber}, Author: ${prAuthor}, SHA: ${headSha}`);
            core.setOutput('pr_number', prNumber);
            core.setOutput('pr_author', prAuthor);
            core.setOutput('head_sha', headSha);

      - name: Checkout
        if: steps.get-pr.outputs.pr_number
        uses: actions/checkout@v4

      - name: Check if author is code owner
        id: check-codeowner
        if: steps.get-pr.outputs.pr_number
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prAuthor = '${{ steps.get-pr.outputs.pr_author }}';

            try {
              const codeownersContent = fs.readFileSync('.github/CODEOWNERS', 'utf8');
              const escapeRegExp = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const contentWithoutComments = codeownersContent
                .split('\n')
                .map(line => line.replace(/#.*/, ''))
                .join('\n');
              const ownerPattern = new RegExp(`(^|\\s)@${escapeRegExp(prAuthor)}(?=\\s|$)`, 'm');
              const isCodeOwner = ownerPattern.test(contentWithoutComments);
              console.log(`Author ${prAuthor} is code owner: ${isCodeOwner}`);
              core.setOutput('is_codeowner', isCodeOwner);
            } catch (error) {
              console.log('CODEOWNERS file not found');
              core.setOutput('is_codeowner', false);
            }

      - name: Wait for checks and verify
        id: check-status
        if: steps.get-pr.outputs.pr_number && steps.check-codeowner.outputs.is_codeowner == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = '${{ steps.get-pr.outputs.head_sha }}';
            const maxRetries = ${{ inputs.max-retries }};
            const retryInterval = ${{ inputs.retry-interval-seconds }} * 1000;

            async function checkStatus() {
              const checkRuns = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha
              });
              const checks = checkRuns.data.check_runs;
              const otherChecks = checks.filter(c => c.name !== 'Auto Approve PR');
              const pendingChecks = otherChecks.filter(c => c.status !== 'completed');
              const failedChecks = otherChecks.filter(c =>
                c.status === 'completed' &&
                c.conclusion !== 'success' &&
                c.conclusion !== 'skipped' &&
                c.conclusion !== 'neutral'
              );
              return { otherChecks, pendingChecks, failedChecks };
            }

            let attempt = 0;
            let result = { otherChecks: [], pendingChecks: [], failedChecks: [] };

            while (attempt < maxRetries) {
              attempt++;
              result = await checkStatus();
              console.log(`Attempt ${attempt}/${maxRetries} - Pending: ${result.pendingChecks.length}, Failed: ${result.failedChecks.length}`);

              if (result.failedChecks.length > 0) break;
              if (result.pendingChecks.length === 0) break;

              if (attempt < maxRetries) {
                await new Promise(r => setTimeout(r, retryInterval));
              }
            }

            const allPassed = result.pendingChecks.length === 0 && result.failedChecks.length === 0 && result.otherChecks.length > 0;
            console.log(`All checks passed: ${allPassed}`);
            core.setOutput('all_checks_passed', allPassed);
            core.setOutput('total_checks', result.otherChecks.length);

      - name: Auto-approve PR
        if: steps.check-codeowner.outputs.is_codeowner == 'true' && steps.check-status.outputs.all_checks_passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.get-pr.outputs.pr_number }}');
            const prAuthor = '${{ steps.get-pr.outputs.pr_author }}';
            const headSha = '${{ steps.get-pr.outputs.head_sha }}';
            const totalChecks = Number('${{ steps.check-status.outputs.total_checks }}');

            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const existing = reviews.data.find(r =>
              r.user.login === 'github-actions[bot]' &&
              r.state === 'APPROVED' &&
              r.commit_id === headSha
            );

            if (existing) {
              console.log('Already approved for this commit');
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'APPROVE',
              body: `Auto-approved: @${prAuthor} is a code owner and all ${totalChecks} checks passed.`
            });

            console.log(`Approved PR #${prNumber}`);

      - name: Log decision
        if: always() && steps.get-pr.outputs.pr_number
        uses: actions/github-script@v7
        with:
          script: |
            const isCodeOwner = '${{ steps.check-codeowner.outputs.is_codeowner }}';
            const allChecksPassed = '${{ steps.check-status.outputs.all_checks_passed }}';
            console.log(`Code owner: ${isCodeOwner}, All checks passed: ${allChecksPassed}`);
            if (isCodeOwner === 'true' && allChecksPassed === 'true') {
              console.log('PR auto-approved');
            } else {
              console.log('PR does not meet auto-approval criteria');
            }

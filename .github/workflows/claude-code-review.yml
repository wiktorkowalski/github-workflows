name: Claude Code Review

# Reusable PR auto-review: reviews every push to a PR and gates on the verdict.
# Recommended caller trigger (track_progress errors on other PR actions):
#   pull_request:
#     types: [opened, synchronize, reopened, ready_for_review]

on:
  workflow_call:
    inputs:
      model:
        description: Claude model to use
        required: false
        type: string
        default: "claude-opus-4-8"
      runner-labels:
        description: JSON array of runner labels
        required: false
        type: string
        default: '["self-hosted", "homelab"]'
      max-turns:
        description: Max Claude turns (controls cost)
        required: false
        type: number
        default: 60
      timeout-minutes:
        description: Job timeout in minutes (frees a stuck runner slot)
        required: false
        type: number
        default: 30
      review-prompt:
        description: Custom review prompt appended to default (empty = default only)
        required: false
        type: string
        default: ""
      track-progress:
        description: Show progress tracking comment
        required: false
        type: boolean
        default: false
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    name: Claude Review
    runs-on: ${{ fromJson(inputs.runner-labels) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    # Supersede the in-progress review when newer commits land.
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # track_progress only supports PR actions opened/synchronize/reopened/ready_for_review
          track_progress: ${{ inputs.track-progress && contains(fromJson('["opened", "synchronize", "reopened", "ready_for_review"]'), github.event.action) }}
          include_fix_links: true
          # NOTE: Bash prefix rules match at word boundaries — "Bash(gh api repos/o/r:*)"
          # does NOT match "gh api repos/o/r/pulls/..." (continues with "/", not a space),
          # which silently denied every gh api call incl. the verdict submission.
          # Keep prefixes at word boundaries. The job token bounds the blast radius.
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns ${{ inputs.max-turns }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh:*),Bash(git:*),Read,Glob,Grep,Write,Edit"
          prompt: |
            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number }}
            HEAD_SHA: ${{ github.event.pull_request.head.sha }}

            You are a senior code reviewer. Review this PR thoroughly.

            $REPO, $PR_NUMBER and $HEAD_SHA below are placeholders, not shell
            variables — substitute the literal values above into every command,
            without quoting the gh api path.

            ## How to review

            1. Run `gh pr diff $PR_NUMBER` to see all changes
            2. Run `gh pr view $PR_NUMBER` for PR description and context
            3. Read relevant surrounding code with `Read` / `Grep` / `Glob` to understand context — don't review in isolation
            4. If there are CI failures visible, inspect them with `gh api`

            ## Use your previous reviews (avoid repeating yourself)

            This PR may have been reviewed by you before on an earlier commit. Before
            writing anything, load what you already said so you don't repeat it:

            - Prior formal reviews + verdicts:
              `gh api repos/$REPO/pulls/$PR_NUMBER/reviews --jq '[.[] | select(.user.login == "claude[bot]")] | .[] | {state, commit_id, body}'`
            - Your prior inline comments (path, line, body):
              `gh api repos/$REPO/pulls/$PR_NUMBER/comments --paginate --jq '[.[] | select(.user.login == "claude[bot]")] | .[] | {path, line, body, commit_id}'`

            Then, when reviewing:
            - **Do NOT re-post an issue you already flagged on a line that is unchanged
              since your last review.** Use the diff to tell what actually changed.
            - If a prior finding's code WAS changed, re-evaluate it: confirm it's fixed
              (mention it as resolved in your summary) or, if still wrong, comment again.
            - You may use `git log` / `git diff <prior_commit_id> $HEAD_SHA`
              to see exactly what moved since your last review, but still review the WHOLE
              PR for correctness — incremental commits can break previously-clean code.
            - New, genuine issues introduced by the latest commits are top priority.

            ## What to look for (in priority order)

            **Critical (always flag):**
            - Security vulnerabilities: injection, auth bypass, secrets exposure, SSRF, path traversal
            - Data loss risks: missing transactions, race conditions, unsafe deletions
            - Bugs: null derefs, off-by-one, wrong conditions, unhandled error paths
            - Breaking changes that aren't called out in the PR description

            **Important (flag when clear):**
            - Logic errors or incorrect assumptions
            - Missing error handling at system boundaries (external APIs, user input, file I/O)
            - Resource leaks (unclosed connections, missing cleanup)
            - Concurrency issues (deadlocks, missing synchronization)

            **Suggestions (only when high-value):**
            - Significantly simpler approaches that reduce complexity
            - Performance issues with measurable impact (N+1 queries, unbounded allocations)

            ## What NOT to flag

            - Style preferences, naming opinions, formatting
            - Missing docs/comments on clear code
            - "Consider using X instead of Y" without concrete benefit
            - Hypothetical future issues ("what if someone later...")
            - Anything that's consistent with existing codebase patterns

            ## How to give feedback

            **Inline comments** — use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true` for each specific issue:
            - Point to the exact line(s) with the problem
            - Explain WHY it's a problem, not just what's wrong
            - For bugs/security: include a concrete scenario that triggers the issue
            - Use ```suggestion blocks when you have a clear fix
            - Only comment on files and lines that are part of the PR diff — GitHub
              rejects comments elsewhere (422) and the comment is silently lost. An
              observation about out-of-diff code belongs in the summary body instead.

            **Summary & verdict** — after reviewing all files, submit exactly one formal review:
            1. Write your summary to `review-body.md` (relative path, repo root) with the
               Write tool. Do NOT inline the summary into the shell command — bodies with
               backticks or `$` inside a quoted `-f body="..."` are rejected by the
               command sandbox, and the verdict never gets submitted.
            2. Submit it:
            - If NO critical or important issues found:
              `gh api repos/$REPO/pulls/$PR_NUMBER/reviews -f event=APPROVE -F body=@review-body.md`
            - If critical or important issues found:
              `gh api repos/$REPO/pulls/$PR_NUMBER/reviews -f event=REQUEST_CHANGES -F body=@review-body.md`
            - Submit a formal review on EVERY run, even if you already approved an
              earlier commit and nothing changed — a CI gate checks for a review on
              the current commit and fails without one.
            - Start the summary with a one-line verdict, then list any findings with file:line references
            - If everything looks good, keep it short — don't pad with generic praise
            - Do NOT post a separate `gh pr comment` — the review body IS your summary

            **The verdict must reflect ALL outstanding issues, not just the latest commits.**
            A later run sees only your most recent review. So if any critical/important
            issue you raised in an earlier review is still unaddressed in the current code,
            you MUST submit `REQUEST_CHANGES` again — even if the newest commits are clean.
            Re-list those still-open findings in the summary. Only `APPROVE` when nothing
            critical/important remains across the entire PR.

            ## Rules

            - Be precise. Vague concerns waste reviewer time.
            - Report every critical/important issue you find, including ones you are
              not fully certain about — state your confidence and severity in the
              comment instead of silently dropping the finding. Only omit things
              matching the "What NOT to flag" list.
            - Respect existing patterns. If the codebase does X consistently, don't flag X.
            - Review ALL files and flag ALL critical/important issues in a single pass. Don't stop after finding the first problem.
            - Read enough context. Don't comment on a function without reading its callers.

            ${{ inputs.review-prompt }}

      # The reviewer failing to submit its verdict has repeatedly been caused by
      # permission denials invisible in the default log — surface them.
      - name: Log permission denials
        if: ${{ !cancelled() }}
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [ -n "$EXECUTION_FILE" ] && [ -f "$EXECUTION_FILE" ]; then
            jq -r '.[] | select(.type == "result") | .permission_denials // [] | .[] | "DENIED \(.tool_name): \(.tool_input | tostring | .[0:400])"' "$EXECUTION_FILE" || true
          else
            echo "no execution file found"
          fi

      - name: Review gate
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          sleep 5

          # Latest verdict-bearing review by Claude. --paginate runs --jq per page,
          # so emit one line per matching review and take the overall last.
          RESULT=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate \
            --jq '.[] | select(.user.login == "claude[bot]") | select(.state == "APPROVED" or .state == "CHANGES_REQUESTED") | "\(.state) \(.commit_id)"' \
            | tail -n 1)

          if [ -z "$RESULT" ]; then
            echo "::error::No formal review by Claude found"
            exit 1
          fi

          read -r REVIEW_STATE REVIEW_COMMIT <<< "$RESULT"
          echo "Claude review state: $REVIEW_STATE (commit $REVIEW_COMMIT)"

          if [ "$REVIEW_STATE" = "CHANGES_REQUESTED" ]; then
            echo "::error::Claude requested changes — see review comments"
            exit 1
          fi

          if [ "$REVIEW_COMMIT" != "$HEAD_SHA" ]; then
            echo "::error::Latest Claude approval is for $REVIEW_COMMIT, not current head $HEAD_SHA — stale approval"
            exit 1
          fi

          echo "Claude approved the PR at the current head commit"

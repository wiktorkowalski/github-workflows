name: Docker Build and Push
description: Build and push Docker image to GHCR with buildx and GHA cache

inputs:
  image-name:
    description: Image name without registry (e.g. wiktorkowalski/myapp)
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: "./Dockerfile"
  context:
    description: Docker build context
    required: false
    default: "."
  push:
    description: Whether to push the image
    required: false
    default: "true"
  build-args:
    description: Docker build arguments (newline-separated)
    required: false
    default: ""
  registry-password:
    description: GHCR password (typically secrets.GITHUB_TOKEN)
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: inputs.push == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.registry-password }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ inputs.image-name }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix=

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
